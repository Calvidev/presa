<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Presa · Calvi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #1C3A2A;
      --green2: #2E5740;
      --cream:  #F2EDE4;
      --paper:  #EDE7DC;
      --border: #C8BCA8;
      --muted:  rgba(28,58,42,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--green);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ─────────────────────────────── */
    header {
      padding: 64px 24px 0;
      text-align: center;
    }

    .logo {
      width: 160px;
      height: 160px;
      object-fit: contain;
      display: block;
      margin: 0 auto 28px;
      clip-path: circle(42% at 50% 50%);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.6rem;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .tagline {
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
    }

    .rule {
      width: 1px;
      height: 48px;
      background: var(--border);
      margin: 36px auto;
    }

    /* ── Section label ───────────────────────── */
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── Calendar ────────────────────────────── */
    .cal-wrap {
      width: 100%;
      max-width: 520px;
      padding: 0 24px;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cal-nav button {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .cal-nav button:hover { color: var(--green); }

    .cal-month {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.35rem;
      letter-spacing: 0.06em;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-dow {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 0 10px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      user-select: none;
      -webkit-user-select: none;
    }

    .cal-day.empty { cursor: default; }

    .cal-day.past {
      color: var(--border);
      cursor: not-allowed;
    }

    .cal-day.booked {
      color: var(--border);
      cursor: not-allowed;
      text-decoration: line-through;
      text-decoration-color: var(--border);
    }

    .cal-day.avail:hover {
      border-color: var(--green2);
    }

    .cal-day.start,
    .cal-day.end-d {
      background: var(--green);
      color: var(--cream);
      border-color: var(--green);
    }

    .cal-day.in-range {
      background: rgba(28,58,42,0.08);
      border-color: transparent;
    }

    /* ── Legend ──────────────────────────────── */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      padding-left: 2px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .legend-pip {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .pip-avail  { background: var(--green); }
    .pip-booked { background: var(--border); }

    /* ── Booking panel ───────────────────────── */
    .booking-panel {
      margin-top: 36px;
      padding: 28px 24px;
      border: 1px solid var(--border);
      background: var(--paper);
      display: none;
    }

    .booking-panel h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      margin-bottom: 18px;
    }

    .stay-summary {
      font-size: 0.8rem;
      color: var(--green2);
      padding: 10px 14px;
      background: rgba(28,58,42,0.06);
      border-left: 2px solid var(--green);
      margin-bottom: 22px;
      letter-spacing: 0.03em;
    }

    .form-field { margin-bottom: 16px; }

    .form-field label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      color: var(--green);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      border-radius: 0;
    }
    .form-field input:focus { border-color: var(--green); }
    .form-field input::placeholder { color: var(--border); }

    .btn-reserve {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--green);
      color: var(--cream);
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-reserve:hover { opacity: 0.82; }

    /* ── Success ─────────────────────────────── */
    .success {
      text-align: center;
      padding: 24px 8px;
    }
    .success p:first-child {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      margin-bottom: 8px;
    }
    .success p.note {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Footer ──────────────────────────────── */
    footer {
      margin-top: auto;
      padding: 48px 24px 32px;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 400px) {
      h1 { font-size: 2rem; }
      .cal-day { font-size: 0.74rem; }
    }
  </style>
</head>
<body>

<header>
  <img src="logo.jpg" alt="La Presa" class="logo">
  <h1>La Presa</h1>
  <p class="tagline">Calvi Family &middot; Summer Home</p>
</header>

<div class="rule"></div>

<main class="cal-wrap">
  <p class="section-label">Availability</p>

  <div class="cal-nav">
    <button id="btnPrev">&#8592; Prev</button>
    <span class="cal-month" id="calMonth"></span>
    <button id="btnNext">Next &#8594;</button>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-pip pip-avail"></div>Available</div>
    <div class="legend-item"><div class="legend-pip pip-booked"></div>Booked</div>
  </div>

  <div class="booking-panel" id="bookingPanel">
    <h2>Reserve your stay</h2>
    <div class="stay-summary" id="staySummary"></div>
    <div id="formWrap">
      <div class="form-field">
        <label>Name</label>
        <input type="text" id="gName" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" id="gEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-reserve" id="btnReserve">Confirm reservation</button>
    </div>
  </div>
</main>

<footer>presa.calvi.dev</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Supabase ───────────────────────────────
  const { createClient } = supabase;
  const db = createClient(
    'https://xlkvhrqlmimzvtfasktd.supabase.co',
    'sb_publishable_ueu-D2SKZybP4080pUMe0w_r5AO-uVf'
  );

  // ── State ──────────────────────────────────
  const today = new Date(); today.setHours(0,0,0,0);
  let vy = today.getFullYear(), vm = today.getMonth();
  let d1 = null, d2 = null;
  let bookedCache = new Set(); // filled from Supabase on load & after booking

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const DOWS   = ['S','M','T','W','T','F','S'];

  // ── Helpers ────────────────────────────────
  function isoDate(date) { return date.toISOString().split('T')[0]; }
  function parseISO(s)   { return new Date(s + 'T12:00:00'); }

  function nightCount(a, b) {
    return Math.round((parseISO(b) - parseISO(a)) / 86400000);
  }

  function fmtDate(iso, opts) {
    return parseISO(iso).toLocaleDateString('en-US', opts);
  }

  function rangeConflicts(a, b) {
    let d = parseISO(a), e = parseISO(b);
    while (d <= e) { if (bookedCache.has(isoDate(d))) return true; d.setDate(d.getDate()+1); }
    return false;
  }

  // ── Fetch booked dates from Supabase ───────
  async function loadBookings() {
    const { data, error } = await db
      .from('bookings')
      .select('start_date, end_date');

    if (error) { console.error('Failed to load bookings:', error); return; }

    const s = new Set();
    data.forEach(b => {
      let d = parseISO(b.start_date);
      const e = parseISO(b.end_date);
      while (d <= e) { s.add(isoDate(d)); d.setDate(d.getDate()+1); }
    });
    bookedCache = s;
    render();
  }

  // ── Render calendar ────────────────────────
  function render() {
    const grid = document.getElementById('calGrid');
    document.getElementById('calMonth').textContent = MONTHS[vm] + ' ' + vy;
    grid.innerHTML = '';

    DOWS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDow = new Date(vy, vm, 1).getDay();
    const totalDays = new Date(vy, vm+1, 0).getDate();

    for (let i = 0; i < firstDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let day = 1; day <= totalDays; day++) {
      const date = new Date(vy, vm, day);
      const iso  = isoDate(date);
      const el   = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = day;

      if (date < today) {
        el.classList.add('past');
      } else if (bookedCache.has(iso)) {
        el.classList.add('booked');
      } else {
        el.classList.add('avail');
        el.dataset.iso = iso;

        if (d1 && d2) {
          const lo = d1 < d2 ? d1 : d2, hi = d1 < d2 ? d2 : d1;
          if (iso === lo)                el.classList.add('start');
          else if (iso === hi)           el.classList.add('end-d');
          else if (iso > lo && iso < hi) el.classList.add('in-range');
        } else if (d1 && iso === d1) {
          el.classList.add('start');
        }

        el.addEventListener('click', onDayClick);
      }

      grid.appendChild(el);
    }
  }

  // ── Click handler ──────────────────────────
  function onDayClick(e) {
    const iso = e.currentTarget.dataset.iso;

    if (!d1 || (d1 && d2)) {
      d1 = iso; d2 = null;
      hidePanel();
    } else {
      const lo = iso < d1 ? iso : d1, hi = iso < d1 ? d1 : iso;
      if (lo === hi)                    { d1 = iso; d2 = null; }
      else if (rangeConflicts(lo, hi))  { d1 = iso; d2 = null; }
      else                              { d1 = lo; d2 = hi; showPanel(); }
    }

    render();
  }

  // ── Booking panel ──────────────────────────
  function showPanel() {
    const nights = nightCount(d1, d2);
    const a = fmtDate(d1, {month:'long', day:'numeric'});
    const b = fmtDate(d2, {month:'long', day:'numeric', year:'numeric'});
    document.getElementById('staySummary').textContent =
      `${a} → ${b}  ·  ${nights} night${nights !== 1 ? 's' : ''}`;

    resetForm();
    const panel = document.getElementById('bookingPanel');
    panel.style.display = 'block';
    setTimeout(() => panel.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
  }

  function hidePanel() {
    document.getElementById('bookingPanel').style.display = 'none';
  }

  function resetForm() {
    document.getElementById('formWrap').innerHTML = `
      <div class="form-field">
        <label>Name</label>
        <input type="text" id="gName" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" id="gEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-reserve" id="btnReserve">Confirm reservation</button>
    `;
    document.getElementById('btnReserve').addEventListener('click', onReserve);
  }

  async function onReserve() {
    const name  = document.getElementById('gName').value.trim();
    const email = document.getElementById('gEmail').value.trim();
    if (!name || !email) { alert('Please enter your name and email.'); return; }

    // Disable button while saving
    const btn = document.getElementById('btnReserve');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    const { error } = await db.from('bookings').insert({
      name,
      email,
      start_date: d1,
      end_date:   d2
    });

    if (error) {
      console.error(error);
      btn.textContent = 'Confirm reservation';
      btn.disabled = false;
      alert('Something went wrong. Please try again.');
      return;
    }

    const firstName = name.split(' ')[0];
    document.getElementById('formWrap').innerHTML = `
      <div class="success">
        <p>See you soon, ${firstName}.</p>
        <p class="note">Your stay has been noted. We'll be in touch at ${email}.</p>
      </div>
    `;

    d1 = null; d2 = null;
    await loadBookings(); // refresh calendar from DB
    setTimeout(() => hidePanel(), 3200);
  }

  // ── Navigation ─────────────────────────────
  document.getElementById('btnPrev').addEventListener('click', () => {
    vm--; if (vm < 0) { vm = 11; vy--; } render();
  });
  document.getElementById('btnNext').addEventListener('click', () => {
    vm++; if (vm > 11) { vm = 0; vy++; } render();
  });

  // ── Init ───────────────────────────────────
  render();         // draw calendar immediately (empty booked set)
  loadBookings();   // then fetch from Supabase and re-render
</script>
</body>
</html>
